<!doctype html>
<html>
  <head>
    <title>Add Maintenance Entry</title>
  </head>
  <body>
    {% extends "base.html" %} {% block title %}Add Maintenance Entry{% endblock
    %} {% block content %}
    <h1>Add Maintenance Entry</h1>

    <div class="card" style="max-width: 480px">
      <form method="POST">
        <div class="form-group">
          <label>Date</label>
          <input type="date" name="date" required />
        </div>
        <div class="form-group">
          <label>Type</label>
          <select name="type" required>
            <option value="">-- Select --</option>
            <option value="Oil Change">Oil Change</option>
            <option value="Chain Adjustment">Chain Adjustment</option>
            <option value="Tire Replacement">Tire Replacement</option>
            <option value="Brake Check">Brake Check</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes (optional)</label>
          <input type="text" name="notes" placeholder="Any details..." />
        </div>
        <button type="submit">Save Entry</button>
      </form>
    </div>

    <br />
    <a href="/bikes/{{ bike_id }}/maintenance">← Back</a>
    {% endblock %}
  </body>
</html>
