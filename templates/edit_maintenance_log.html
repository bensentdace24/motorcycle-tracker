{% extends "base.html" %}
{% block title %}Edit Maintenance Entry{% endblock %}

{% block content %}

<div style="max-width: 560px; margin: 0 auto; padding: 20px;">
    <!-- Header Section -->
    <div style="margin-bottom: 28px;">
        <a href="/bikes/{{ log['bike_id'] }}/maintenance"
            style="font-size: 13px; color: #e05c00; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 16px; font-weight: 500;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to Maintenance
        </a>
        
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
            <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #e05c00, #ff8c42); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                </svg>
            </div>
            <div>
                <h1 style="font-size: 28px; font-weight: 700; margin: 0; color: #1a1a2e;">Edit Maintenance Entry</h1>
                <p style="color: #666; font-size: 14px; margin-top: 4px;">Update your service record details</p>
            </div>
        </div>
    </div>

    <!-- Form Card -->
    <div style="
        background: white;
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        border: 1px solid rgba(0,0,0,0.05);
    ">
        <form method="POST">

            <!-- Date Field -->
            <div style="margin-bottom: 24px;">
                <label style="
                    display: block;
                    font-size: 13px;
                    font-weight: 600;
                    color: #1a1a2e;
                    margin-bottom: 8px;
                ">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; margin-right: 6px;">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    Date
                </label>
                <input type="date" 
                       name="date" 
                       value="{{ log['date'] }}" 
                       required 
                       style="
                        width: 100%;
                        padding: 12px 16px;
                        border: 1.5px solid #e2e8f0;
                        border-radius: 12px;
                        font-size: 14px;
                        color: #1a1a2e;
                        outline: none;
                        transition: all 0.2s;
                        font-family: inherit;
                    "
                    onfocus="this.style.borderColor='#e05c00'; this.style.boxShadow='0 0 0 3px rgba(224,92,0,0.1)'"
                    onblur="this.style.borderColor='#e2e8f0'; this.style.boxShadow='none'"
                >
            </div>

            <!-- Type Field -->
            <div style="margin-bottom: 24px;">
                <label style="
                    display: block;
                    font-size: 13px;
                    font-weight: 600;
                    color: #1a1a2e;
                    margin-bottom: 8px;
                ">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; margin-right: 6px;">
                        <path d="M12 6v6l4 2"/>
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                    Maintenance Type
                </label>
                <select name="type" required style="
                    width: 100%;
                    padding: 12px 16px;
                    border: 1.5px solid #e2e8f0;
                    border-radius: 12px;
                    font-size: 14px;
                    color: #1a1a2e;
                    outline: none;
                    background: white;
                    cursor: pointer;
                    transition: all 0.2s;
                "
                onfocus="this.style.borderColor='#e05c00'; this.style.boxShadow='0 0 0 3px rgba(224,92,0,0.1)'"
                onblur="this.style.borderColor='#e2e8f0'; this.style.boxShadow='none'"
                >
                    <option value="">-- Select type --</option>
                    <option value="Oil Change" {% if log['type'] == 'Oil Change' %}selected{% endif %}>
                        🔧 Oil Change
                    </option>
                    <option value="Chain Adjustment" {% if log['type'] == 'Chain Adjustment' %}selected{% endif %}>
                        ⚙️ Chain Adjustment
                    </option>
                    <option value="Tire Replacement" {% if log['type'] == 'Tire Replacement' %}selected{% endif %}>
                        🛞 Tire Replacement
                    </option>
                    <option value="Brake Check" {% if log['type'] == 'Brake Check' %}selected{% endif %}>
                        🛑 Brake Check
                    </option>
                    <option value="Engine Tune-up" {% if log['type'] == 'Engine Tune-up' %}selected{% endif %}>
                        🚀 Engine Tune-up
                    </option>
                    <option value="Battery Replacement" {% if log['type'] == 'Battery Replacement' %}selected{% endif %}>
                        🔋 Battery Replacement
                    </option>
                    <option value="Other" {% if log['type'] == 'Other' %}selected{% endif %}>
                        📝 Other
                    </option>
                </select>
            </div>

            <!-- Notes Field -->
            <div style="margin-bottom: 28px;">
                <label style="
                    display: block;
                    font-size: 13px;
                    font-weight: 600;
                    color: #1a1a2e;
                    margin-bottom: 8px;
                ">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; margin-right: 6px;">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    Notes
                    <span style="font-weight: 400; color: #94a3b8;">(optional)</span>
                </label>
                <textarea name="notes" 
                          rows="4" 
                          placeholder="Add details about this maintenance... (e.g., parts replaced, service provider, cost, etc.)" 
                          style="
                            width: 100%;
                            padding: 12px 16px;
                            border: 1.5px solid #e2e8f0;
                            border-radius: 12px;
                            font-size: 14px;
                            color: #1a1a2e;
                            outline: none;
                            resize: vertical;
                            font-family: inherit;
                            transition: all 0.2s;
                            line-height: 1.5;
                        "
                        onfocus="this.style.borderColor='#e05c00'; this.style.boxShadow='0 0 0 3px rgba(224,92,0,0.1)'"
                        onblur="this.style.borderColor='#e2e8f0'; this.style.boxShadow='none'"
                >{{ log['notes'] or '' }}</textarea>
                <div style="font-size: 12px; color: #94a3b8; margin-top: 6px;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline; margin-right: 4px;">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="12" x2="12" y2="16"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                    Include any important details about this service
                </div>
            </div>

            <!-- Info Card -->
            <div style="
                background: #fff7ed;
                border-left: 3px solid #e05c00;
                padding: 12px 16px;
                border-radius: 12px;
                margin-bottom: 28px;
            ">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e05c00" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span style="font-size: 13px; color: #1a1a2e;">
                        <strong>Editing record from</strong> 
                        <span style="color: #e05c00; font-weight: 600;">{{ log['date'] }}</span>
                    </span>
                </div>
            </div>

            <!-- Divider -->
            <div style="height: 1px; background: linear-gradient(90deg, #e2e8f0, transparent); margin-bottom: 24px;"></div>

            <!-- Buttons -->
            <div style="display: flex; gap: 12px;">
                <button type="submit" style="
                    flex: 1;
                    padding: 14px;
                    background: linear-gradient(135deg, #e05c00, #ff8c42);
                    color: white;
                    border: none;
                    border-radius: 12px;
                    font-size: 14px;
                    font-weight: 600;
                    cursor: pointer;
                    transition: all 0.2s;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 8px;
                "
                onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 5px 15px rgba(224,92,0,0.3)'"
                onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none'"
                >
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M20 14.66V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5.34"/>
                        <polygon points="18 2 22 6 12 16 8 16 8 12 18 2"/>
                    </svg>
                    Save Changes
                </button>
                <a href="/bikes/{{ log['bike_id'] }}/maintenance" style="
                    flex: 1;
                    padding: 14px;
                    background: #f1f5f9;
                    color: #475569;
                    border: none;
                    border-radius: 12px;
                    font-size: 14px;
                    font-weight: 600;
                    cursor: pointer;
                    text-align: center;
                    text-decoration: none;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 8px;
                    transition: all 0.2s;
                "
                onmouseover="this.style.background='#e2e8f0'; this.style.transform='translateY(-1px)'"
                onmouseout="this.style.background='#f1f5f9'; this.style.transform='translateY(0)'"
                >
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                    Cancel
                </a>
            </div>

        </form>
    </div>
</div>

{% endblock %}
