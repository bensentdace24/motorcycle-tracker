{% extends "base.html" %}
{% block title %}Edit Maintenance Entry{% endblock %}

{% block content %}
<h1>Edit Maintenance Entry</h1>

<div class="card" style="max-width: 480px;">
  <form method="POST">
    <div class="form-group">
      <label>Date</label>
      <input type="date" name="date" value="{{ log['date'] }}" required>
    </div>
    <div class="form-group">
      <label>Type</label>
      <select name="type" required>
        <option value="">-- Select --</option>
        <option value="Oil Change"       {% if log['type'] == 'Oil Change' %}selected{% endif %}>Oil Change</option>
        <option value="Chain Adjustment" {% if log['type'] == 'Chain Adjustment' %}selected{% endif %}>Chain Adjustment</option>
        <option value="Tire Replacement" {% if log['type'] == 'Tire Replacement' %}selected{% endif %}>Tire Replacement</option>
        <option value="Brake Check"      {% if log['type'] == 'Brake Check' %}selected{% endif %}>Brake Check</option>
        <option value="Other"            {% if log['type'] == 'Other' %}selected{% endif %}>Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notes (optional)</label>
      <input type="text" name="notes" value="{{ log['notes'] or '' }}">
    </div>
    <button type="submit">Save Changes</button>
  </form>
</div>

<br>
<a href="/bikes/{{ log['bike_id'] }}/maintenance">← Back</a>
{% endblock %}
