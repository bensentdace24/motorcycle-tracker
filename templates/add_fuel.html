<!doctype html>
<html>
  <head>
    <title>Add Fuel Entry</title>
  </head>
  <body>
    {% extends "base.html" %} {% block title %}Add Fuel Entry{% endblock %} {%
    block content %}
    <h1>Add Fuel Entry</h1>

    <div class="card" style="max-width: 480px">
      <form method="POST">
        <div class="form-group">
          <label>Date</label>
          <input type="date" name="date" required />
        </div>
        <div class="form-group">
          <label>Odometer (km)</label>
          <input type="number" step="0.1" name="odometer_km" required />
        </div>
        <div class="form-group">
          <label>Liters filled</label>
          <input type="number" step="0.01" name="liters" required />
        </div>
        <div class="form-group">
          <label>Price (optional)</label>
          <input type="number" step="0.01" name="price" />
        </div>
        <button type="submit">Save Entry</button>
      </form>
    </div>

    <br />
    <a href="/bikes/{{ bike_id }}/fuel">← Back</a>
    {% endblock %}
  </body>
</html>
